- defaults:
    link:
      relink: true
      force: true

- clean: ["~"]

- shell:
    # Bootstrap all submodules: dotbot, dotbot-git, dotbot-brew, .oh-my-zsh
    - [git submodule update --init --recursive, Installing submodules]
    # Drop-and-recreate our managed bootstrap block at the top of ~/.zshrc.
    # The block wires in (in order): tmux auto-attach (must run before p10k
    # so the takeover happens before instant prompt paints), p10k instant
    # prompt, and sourcing of ~/.zshrcdotfiles. Everything between the
    # BEGIN/END markers is owned by this installer — hand-edits inside will
    # be overwritten on next run.
    # Migration: also strips legacy unmarked p10k/source and old-style
    # ### tmux-picker blocks so users upgrading from the previous install
    # script end up with a single managed section. Block is staged in a
    # tempfile because BSD awk (macOS) rejects multi-line -v.
    - - |
        bf=$(mktemp)
        cat > "$bf" <<'BLOCK'
        ### dotfiles-managed — BEGIN (drop-and-recreated by install.conf.yaml; do not hand-edit)
        # tmux auto-attach — every fresh interactive shell becomes a tmux
        # client. Attaches to the most-recently-active session, or creates
        # `main` if none exist. SHLVL=1 guard makes subshells and `exec zsh`
        # skip naturally; NO_TMUX=1 is the escape hatch for a one-off plain
        # zsh (e.g. when tmux itself is misbehaving). The `&& exit` (instead
        # of `exec tmux`) is deliberate: if tmux fails to take over the tty
        # (e.g. ssh through a relay that allocates a pty zsh accepts but tmux
        # rejects with "open terminal failed: not a terminal"), the shell
        # falls through to a plain interactive zsh rather than tearing down
        # the whole login session.
        if [[ -z "$TMUX" && -z "$NO_TMUX" && $SHLVL -eq 1 && -o interactive && -t 0 && -t 1 ]]; then
          export PATH="$HOME/.dotfiles/shell/bin:/opt/homebrew/bin:/home/linuxbrew/.linuxbrew/bin:$PATH"
          if command -v tmux >/dev/null 2>&1; then
            _last=$(tmux list-sessions -F '#{session_last_attached} #{session_name}' 2>/dev/null \
              | sort -rn | head -1 | awk '{print $2}')
            if [[ -n "$_last" ]]; then
              tmux attach -t "$_last" && exit
            else
              tmux new-session -s main && exit
            fi
          fi
        fi

        # p10k instant prompt (must be near top of .zshrc)
        if [[ -r "${XDG_CACHE_HOME:-$HOME/.cache}/p10k-instant-prompt-${(%):-%n}.zsh" ]]; then
          source "${XDG_CACHE_HOME:-$HOME/.cache}/p10k-instant-prompt-${(%):-%n}.zsh"
        fi

        # Load dotfiles config
        [[ -f ~/.zshrcdotfiles ]] && source ~/.zshrcdotfiles
        ### dotfiles-managed — END
        BLOCK
        # 1. Strip any existing managed content: new outer markers, plus legacy
        #    unmarked p10k/source lines and old-style tmux-picker block. One
        #    trailing blank after each stripped region is absorbed via `eat`.
        if [ -f ~/.zshrc ]; then
          awk '
            /^### dotfiles-managed — BEGIN/ { mg=1; next }
            mg && /^### dotfiles-managed — END/ { mg=0; eat=1; next }
            mg { next }
            /^### tmux-picker — runs/ { tp=1; next }
            tp && /^### tmux-picker — END/ { tp=0; eat=1; next }
            tp { next }
            /^# p10k instant prompt \(must be near top of \.zshrc\)$/ { p10=1; next }
            p10 && /^\[\[ -f ~\/\.zshrcdotfiles \]\] && source ~\/\.zshrcdotfiles$/ { p10=0; eat=1; next }
            p10 { next }
            eat { eat=0; if ($0 == "") next }
            { print }
          ' ~/.zshrc > ~/.zshrc.new && mv ~/.zshrc.new ~/.zshrc
        fi
        # 2. Prepend the fresh managed block (p10k instant prompt belongs near
        #    the top of ~/.zshrc, so the whole managed section goes first).
        { cat "$bf"; printf '\n'; cat ~/.zshrc 2>/dev/null; } > ~/.zshrc.new && mv ~/.zshrc.new ~/.zshrc
        rm -f "$bf"
      - Managing bootstrap block at top of ~/.zshrc
    # Ensure ~/.ssh/config is a regular file (not a symlink) that includes our public SSH config.
    # Grep for the actual Include directive — avoids false-positive on the comment at top of ssh/config.
    - - |
        if [[ -L ~/.ssh/config ]]; then
          rm ~/.ssh/config
        fi
        grep -qxF 'Include ~/.ssh/config.dotfiles' ~/.ssh/config 2>/dev/null || echo 'Include ~/.ssh/config.dotfiles' >> ~/.ssh/config
      - Ensuring ~/.ssh/config includes config.dotfiles
    # Ensure ~/.gitconfig is a regular file (not a symlink) that only references our public config.
    # Prevents `git config --global` or tooling like dd-auth from writing DataDog-specific settings
    # (e.g. core.hooksPath = /usr/local/dd/...) into the public dotfiles repo.
    - - |
        if [[ -L ~/.gitconfig ]]; then
          rm ~/.gitconfig
        fi
        grep -qF 'path = ~/.gitconfig.dotfiles' ~/.gitconfig 2>/dev/null || cat >> ~/.gitconfig <<'INCL'
        [include]
          path = ~/.gitconfig.dotfiles
        INCL
      - Ensuring ~/.gitconfig includes .gitconfig.dotfiles
    # Enable macOS press-and-hold accent popup in Ghostty (disabled by default in terminal apps)
    # Note: popup appears after one key repeat (Ghostty limitation — InitialKeyRepeat has no effect)
    - - |
        if [[ "$(uname)" == "Darwin" ]]; then
          defaults write com.mitchellh.ghostty ApplePressAndHoldEnabled -bool true
        fi
      - Enable press-and-hold accents in Ghostty (macOS only)
    # Note: fzf, w3m, and nono on Linux are now installed via the Brewfile —
    # the top-level `install` script bootstraps Linuxbrew on Linux before
    # running `brew bundle`, so there's no separate apt/.deb path to maintain.
    # atuin-server — let brew services own the launchd lifecycle (it ships its
    # own plist at homebrew.mxcl.atuin-server). We just symlink brew's expected
    # config path to our dotfiles-managed server.toml so the daemon reads our
    # settings (loopback bind, SQLite backend, open_registration toggle).
    # Remote hosts reach the server via SSH RemoteForward 8888:127.0.0.1:8888.
    # One-time post-install: `atuin register -u luphaz ...` against
    # http://127.0.0.1:8888, then `atuin login` on each client machine.
    #
    # Migration cleanup: #14 rendered a hand-rolled plist at
    # ~/Library/LaunchAgents/sh.atuin.server.plist. Tear it down if present.
    - - |
        if [[ "$(uname)" == "Darwin" ]] && brew list atuin-server >/dev/null 2>&1; then
          # Tear down the legacy hand-rolled plist from PR #14 (no-op if absent)
          legacy_plist="$HOME/Library/LaunchAgents/sh.atuin.server.plist"
          if [[ -f "$legacy_plist" ]]; then
            launchctl bootout "gui/$(id -u)/sh.atuin.server" 2>/dev/null || true
            rm -f "$legacy_plist"
          fi
          # SQLite db lives at $HOME/.local/share/atuin-server/server.db per
          # server.toml's db_uri. sqlx-sqlite creates the file on first run (via
          # ?mode=rwc) but not the parent directory — so we mkdir it here.
          mkdir -p "$HOME/.local/share/atuin-server"
          # Point brew's expected config path at our dotfiles-managed file.
          # /opt/homebrew (ARM) or /usr/local (Intel) — brew --prefix handles both.
          brew_prefix="$(brew --prefix)"
          cfg_dir="${brew_prefix}/etc/atuin-server"
          mkdir -p "$cfg_dir"
          ln -sfn "$HOME/.dotfiles/atuin/server.toml" "${cfg_dir}/server.toml"
          # Idempotent: `brew services start` is a no-op if already running and
          # will pick up config changes on restart. Use `restart` on config edits.
          brew services start atuin-server >/dev/null || true
        fi
      - Install + start atuin-server via brew services (macOS)

# Sync oh-my-zsh custom plugins/themes (oh-my-zsh itself is a submodule
# managed by `git submodule update` in the install script). Replaces
# the dotbot-git directive: that plugin's clone-or-pull mode worked
# online but spammed "git command failed" once per entry during a
# GitHub outage AND propagated the failure into dotbot's "Some tasks
# were not executed successfully" — which the wrapper used to swallow.
# This shell block keeps the auto-update behaviour but tolerates
# offline runs gracefully:
#   - Existing dir: `git pull --quiet 2>/dev/null || true` — silent on
#     network failure, kept-existing version stays in place.
#   - Missing dir: `git clone --quiet ... || warn` — best-effort; if
#     offline on a fresh machine, the user sees a single warning per
#     missing plugin rather than dotbot's noise. Plugin will be cloned
#     on the next online run.
# `method: clone-or-pull` (dotbot-git default) is preserved in spirit;
# we just route through shell so we can suppress transient errors.
- shell:
    - - |
        custom="$HOME/.dotfiles/.oh-my-zsh/custom"
        plugins=(
          "themes/powerlevel10k|https://github.com/romkatv/powerlevel10k.git"
          "plugins/fzf-tab|https://github.com/Aloxaf/fzf-tab.git"
          "plugins/fast-syntax-highlighting|https://github.com/zdharma-continuum/fast-syntax-highlighting.git"
          "plugins/zsh-autosuggestions|https://github.com/zsh-users/zsh-autosuggestions.git"
          "plugins/forgit|https://github.com/wfxr/forgit.git"
          "plugins/jq|https://github.com/reegnz/jq-zsh-plugin.git"
        )
        for entry in "${plugins[@]}"; do
          path="${entry%%|*}"
          url="${entry##*|}"
          dir="$custom/$path"
          if [ -d "$dir/.git" ]; then
            git -C "$dir" pull --quiet --ff-only 2>/dev/null || true
          else
            mkdir -p "$(dirname "$dir")"
            git clone --quiet "$url" "$dir" \
              || echo "  ⚠ couldn't clone ${path##*/} (offline?) — will retry next install"
          fi
        done
      - Sync oh-my-zsh custom plugins/themes (offline-tolerant)

- create:
    - ~/.config/nvim
    - ~/.config/atuin

- link:
    # Sources use `~/.dotfiles/...` (the normalised symlink) rather than relative
    # BASEDIR paths so the symlinks dotbot creates resolve through ~/.dotfiles
    # at runtime instead of being pinned to the BASEDIR that happened to be
    # active during install. After a `dotfiles-switch` retargets ~/.dotfiles,
    # downstream config (~/.tmux.conf, ~/.zshrcdotfiles, etc.) follows for free.
    # The ~/.dotfiles symlink itself is created by the install script
    # (ln -sfn "${BASEDIR}") before dotbot runs — don't re-add it here, that
    # would hardcode the target to main.
    ~/.gitattributes: ~/.dotfiles/git/.gitattributes
    ~/.gitignore: ~/.dotfiles/git/.gitignore
    ~/.gitconfig.dotfiles: ~/.dotfiles/git/.gitconfig
    ~/.ssh/config.dotfiles: ~/.dotfiles/ssh/config
    ~/.zshrcdotfiles: ~/.dotfiles/shell/.zshrc
    ~/.p10k.zsh: ~/.dotfiles/shell/.p10k.zsh
    ~/.tmux.conf: ~/.dotfiles/tmux/.tmux.conf
    # Ghostty is a macOS terminal emulator; skip on Linux so we don't
    # create a useless ~/.config/ghostty/ tree on workspaces. `create: true`
    # makes dotbot mkdir the parent dir on the macOS path (it's no longer
    # in the top-level `create:` task above).
    ~/.config/ghostty/config:
      path: ~/.dotfiles/ghostty/config
      create: true
      if: '[ "$(uname)" = "Darwin" ]'
    ~/.config/nvim/init.lua: ~/.dotfiles/nvim/init.lua
    # atuin-server runs only on the Mac (brew service `atuin-server`), so
    # the server config is Mac-only. atuin-server.toml on Linux would be
    # a dangling reference (no service consumes it).
    ~/.config/atuin/server.toml:
      path: ~/.dotfiles/atuin/server.toml
      if: '[ "$(uname)" = "Darwin" ]'
    ~/.config/atuin/config.toml: ~/.dotfiles/atuin/config.toml
    # Pin tfenv's global default Terraform version. tfenv reads
    # ~/.terraform-version when no closer .terraform-version exists, so
    # this gives a sane default on every machine + repo. Edit the file
    # in this repo to bump; the next install pass picks up the change
    # via the `tfenv install` shell block below.
    ~/.terraform-version: ~/.dotfiles/tfenv/.terraform-version
    # Per-file symlinks (NOT a directory symlink) so the dd overlay's xbar
    # plugin (045-workspaces.2m.sh, symlinked separately by workspaces-dotfiles
    # install.sh) can coexist alongside the public ones. The `/*` glob
    # expansion is what makes dotbot create one symlink per file rather than
    # symlinking the whole `xbar/plugins` directory; force:true clobbers any
    # stale entries.
    #
    # Gated on macOS: xbar only runs there. On Linux (workspaces) we'd be
    # creating a useless ~/Library/... directory tree and trying to clobber
    # whatever stock files happen to be there. `create: true` makes dotbot
    # mkdir the target dir on first install, which we no longer pre-create
    # via the top-level `create:` task above (also Mac-specific).
    ~/Library/Application Support/xbar/plugins:
      path: ~/.dotfiles/xbar/plugins/*
      glob: true
      force: true
      create: true
      if: '[ "$(uname)" = "Darwin" ]'

# ── tfenv bootstrap ─────────────────────────────────────────────────
# Install the pinned terraform version after the ~/.terraform-version
# symlink is in place (link block above). `tfenv install` with no arg
# reads ~/.terraform-version, fetches that version's binary if missing,
# and is a no-op when already installed — cache-driven on repeat runs.
#
# TFENV_CONFIG_DIR pinning: we set it to ~/.tfenv inline so dotbot's
# non-interactive shell sees it (zshrc isn't sourced from here). This
# is the data dir (versions/, .install-lock-*); without the override
# tfenv defaults it to TFENV_ROOT, which when installed via brew is
# the volatile Cellar/tfenv/<v>/ dir. See shell/.zshrc for the long
# rationale; short version: persistent location survives `brew upgrade
# tfenv` and gives the install pipeline a stable spot to pre-clean
# stale lock dirs.
#
# Defensive: clear stale lock dirs (mtime >5min ago) before invoking
# install. mkdir-based locks held by a live tfenv install will be
# fresh; anything older was abandoned.
- shell:
    - - |
        if command -v tfenv >/dev/null 2>&1; then
          export TFENV_CONFIG_DIR="${HOME}/.tfenv"
          mkdir -p "$TFENV_CONFIG_DIR"
          find "$TFENV_CONFIG_DIR" -maxdepth 1 -type d -name '.install-lock-*' -mmin +5 -exec rm -rf {} + 2>/dev/null || true
          tfenv install
        fi
      - Install pinned terraform via tfenv (TFENV_CONFIG_DIR=~/.tfenv, reads ~/.terraform-version)
