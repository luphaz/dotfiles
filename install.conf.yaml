- defaults:
    link:
      relink: true
      force: true

- clean: ["~"]

- shell:
    # Bootstrap all submodules: dotbot, dotbot-git, dotbot-brew, .oh-my-zsh
    - [git submodule update --init --recursive, Installing submodules]
    # Append zshrcdotfiles hook to ~/.zshrc if not already present.
    # Grep for the actual source line — avoids false-positive on the comment at top of zshrcdotfiles.
    - - |
        grep -qF 'source ~/.zshrcdotfiles' ~/.zshrc 2>/dev/null || cat >> ~/.zshrc <<'HOOK'

        # p10k instant prompt (must be near top of .zshrc)
        if [[ -r "${XDG_CACHE_HOME:-$HOME/.cache}/p10k-instant-prompt-${(%):-%n}.zsh" ]]; then
          source "${XDG_CACHE_HOME:-$HOME/.cache}/p10k-instant-prompt-${(%):-%n}.zsh"
        fi

        # Load dotfiles config
        [[ -f ~/.zshrcdotfiles ]] && source ~/.zshrcdotfiles
        HOOK
      - Hooking zshrcdotfiles into .zshrc
    # Ensure ~/.ssh/config is a regular file (not a symlink) that includes our public SSH config.
    # Grep for the actual Include directive — avoids false-positive on the comment at top of ssh/config.
    - - |
        if [[ -L ~/.ssh/config ]]; then
          rm ~/.ssh/config
        fi
        grep -qxF 'Include ~/.ssh/config.dotfiles' ~/.ssh/config 2>/dev/null || echo 'Include ~/.ssh/config.dotfiles' >> ~/.ssh/config
      - Ensuring ~/.ssh/config includes config.dotfiles
    # Ensure ~/.gitconfig is a regular file (not a symlink) that only references our public config.
    # Prevents `git config --global` or tooling like dd-auth from writing DataDog-specific settings
    # (e.g. core.hooksPath = /usr/local/dd/...) into the public dotfiles repo.
    - - |
        if [[ -L ~/.gitconfig ]]; then
          rm ~/.gitconfig
        fi
        grep -qF 'path = ~/.gitconfig.dotfiles' ~/.gitconfig 2>/dev/null || cat >> ~/.gitconfig <<'INCL'
        [include]
          path = ~/.gitconfig.dotfiles
        INCL
      - Ensuring ~/.gitconfig includes .gitconfig.dotfiles
    # Enable macOS press-and-hold accent popup in Ghostty (disabled by default in terminal apps)
    # Note: popup appears after one key repeat (Ghostty limitation — InitialKeyRepeat has no effect)
    - - |
        if [[ "$(uname)" == "Darwin" ]]; then
          defaults write com.mitchellh.ghostty ApplePressAndHoldEnabled -bool true
        fi
      - Enable press-and-hold accents in Ghostty (macOS only)
    # Install essentials on Linux (workspaces/EC2) — macOS uses Brewfile instead.
    - - |
        if [[ "$(uname)" != "Darwin" ]]; then
          sudo apt-get install -y fzf w3m 2>/dev/null || true
        fi
      - Installing essentials (Linux)
    # Install nono (AI agent sandbox) on Linux from the upstream .deb.
    # Pinned to a specific version + SHA256 per arch. Upstream's SHA256SUMS.txt
    # only signs the .tar.gz builds, not the .deb — so we pin our own SHAs here,
    # computed once and bumped via shell/bin/nono-bump.
    - - |
        if [[ "$(uname)" != "Darwin" ]] && ! command -v nono >/dev/null 2>&1; then
          if command -v dpkg >/dev/null 2>&1 && command -v curl >/dev/null 2>&1; then
            NONO_VERSION=0.37.1
            NONO_SHA256_AMD64=70bbcd46a31103563bdfd9f88ec71d52c59c7cf6dc14723b48b21b92fddeb942
            NONO_SHA256_ARM64=069d6b72bd914b8be1c57c45b1ad52fd43fcabc87982dcf11bb6e0be86d61e6d
            arch=$(dpkg --print-architecture)
            case "$arch" in
              amd64) expected="$NONO_SHA256_AMD64" ;;
              arm64) expected="$NONO_SHA256_ARM64" ;;
              *) echo "nono: arch '$arch' not pinned, skipping"; expected="" ;;
            esac
            if [[ -n "$expected" ]]; then
              tmp=$(mktemp -d)
              deb="$tmp/nono.deb"
              url="https://github.com/always-further/nono/releases/download/v${NONO_VERSION}/nono-cli_${NONO_VERSION}_${arch}.deb"
              if curl -fsSL -o "$deb" "$url"; then
                got=$(sha256sum "$deb" | awk '{print $1}')
                if [[ "$got" == "$expected" ]]; then
                  sudo dpkg -i "$deb" || true
                else
                  echo "nono: SHA256 mismatch for $arch (expected $expected, got $got); skipping"
                fi
              else
                echo "nono: download failed; skipping"
              fi
              rm -rf "$tmp"
            fi
          fi
        fi
      - Installing nono (Linux .deb, pinned)

# Clone oh-my-zsh plugins into ~/.dotfiles/.oh-my-zsh/custom/ (oh-my-zsh itself is a submodule)
- git:
    ~/.dotfiles/.oh-my-zsh/custom/themes/powerlevel10k:
      url: https://github.com/romkatv/powerlevel10k.git
      description: "oh my zsh - powerlevel10k"
    ~/.dotfiles/.oh-my-zsh/custom/plugins/fzf-tab:
      url: https://github.com/Aloxaf/fzf-tab.git
      description: "oh my zsh - fzf-tab"
    ~/.dotfiles/.oh-my-zsh/custom/plugins/fast-syntax-highlighting:
      url: https://github.com/zdharma-continuum/fast-syntax-highlighting.git
      description: "oh my zsh - fast-syntax-highlighting"
    ~/.dotfiles/.oh-my-zsh/custom/plugins/forgit:
      url: https://github.com/wfxr/forgit.git
      description: "oh my zsh - forgit"
    ~/.dotfiles/.oh-my-zsh/custom/plugins/jq:
      url: https://github.com/reegnz/jq-zsh-plugin.git
      description: "oh my zsh - jq"

- create:
    - ~/.config/nvim
    - ~/.config/ghostty
    - ~/.config/nono/profiles
    - ~/Library/Application Support/xbar/plugins

- link:
    # Note: ~/.dotfiles symlink is created by the install script (ln -sfn "${BASEDIR}")
    # so that worktree-based installs (dotfiles-switch) point at the right checkout.
    # Don't re-add it as a dotbot link here — that hardcodes the target to main.
    ~/.gitattributes: git/.gitattributes
    ~/.gitignore: git/.gitignore
    ~/.gitconfig.dotfiles: git/.gitconfig
    ~/.ssh/config.dotfiles: ssh/config
    ~/.zshrcdotfiles: shell/.zshrc
    ~/.p10k.zsh: shell/.p10k.zsh
    ~/.tmux.conf: tmux/.tmux.conf
    ~/.config/ghostty/config: ghostty/config
    ~/.config/nvim/init.lua: nvim/init.lua
    # nono profiles linked per-file (glob pattern required) so workspaces-dotfiles
    # can overlay its own profiles (e.g. cc-dd.json extends cc-luphaz) in the same dir.
    ~/.config/nono/profiles:
      path: nono/profiles/*.json
      glob: true
      force: true
    ~/Library/Application Support/xbar/plugins:
      path: xbar/plugins
      glob: true
      force: true
