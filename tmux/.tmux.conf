# ── Passthrough & Environment ────────────────────────────────────────
# Allow passthrough sequences so Claude Code notifications and progress
# bar reach the outer terminal (cmux) when running inside tmux or over SSH.
# (tmux 3.3+ only — silently ignored on older versions)
if-shell 'tmux -V | awk "{if (\$2+0 >= 3.3) exit 0; else exit 1}"' \
  'set -g allow-passthrough on'

# Propagate SSH/display env vars into new panes and windows so agent
# forwarding and X11/Wayland display survive session reattach.
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION DISPLAY"

# ── Prefix ───────────────────────────────────────────────────────────
# Ctrl+b (default) kept as fallback for other tmux commands.
# Ctrl+Space is freed for the URL opener in the root table.
set -g prefix C-b
unbind C-Space

# ── Scrolling & Mouse ───────────────────────────────────────────────
# Enable mouse/trackpad/touch input: scroll with swipe on Mac trackpad,
# swipe in Termius on iPhone, click to select panes, drag to resize.
set -g mouse on

# ── Terminal & Rendering ─────────────────────────────────────────────
# Modern terminfo with italic, strikethrough, and truecolor support.
set -g default-terminal "tmux-256color"

# Zero delay after Escape -- eliminates input lag. Safe because we use
# Ctrl+b as prefix (not raw Escape-prefixed sequences).
set -sg escape-time 0

# Let applications detect pane focus changes (e.g. vim autocommands).
set -g focus-events on

# Forward extended key sequences (Shift+Enter, Ctrl+Enter, etc.) to
# applications unconditionally. Without this, tmux swallows modifier
# info and Claude Code can't distinguish Shift+Enter from Enter.
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Enable OSC 8 hyperlink passthrough so the outer terminal can render
# clickable URLs. Use Cmd+Click on Mac (bypasses tmux mouse capture).
set -as terminal-features 'xterm*:hyperlinks'

# ── Scrollback ───────────────────────────────────────────────────────
# 50k lines per pane. Claude Code output is verbose; the default 2000
# is far too small for scrolling back through tool calls and diffs.
set -g history-limit 50000

# ── Clipboard ────────────────────────────────────────────────────────
# OSC 52: let tmux set the system clipboard through the outer terminal.
# Works across Ghostty/cmux locally and Termius over SSH.
set -g set-clipboard on

# Also pipe to pbcopy for local macOS sessions (tmux 3.2+ feature).
set -g copy-command "pbcopy"

# ── Status Bar ────────────────────────────────────────────────────────
# Left: session name (repo). Right: live git branch + time.
# Branch is dynamic (re-evaluated every 5s) so it tracks Claude's
# branch switches (main → feature branch workflow).
set -g status-style 'fg=white,bg=default'
set -g status-left '#[fg=green,bold] #S #[default]'
set -g status-left-length 30
set -g status-right '#[fg=yellow]#(git -C "#{pane_current_path}" --no-optional-locks symbolic-ref --short HEAD 2>/dev/null)#[default] #[fg=white]%H:%M#[default] '
set -g status-right-length 60
set -g status-interval 5
set -g window-status-current-style 'fg=cyan,bold'

# ── URL Opener ───────────────────────────────────────────────────────
# Extracts URLs from the visible pane + scrollback and opens the selected
# one via fzf popup. Ctrl+L chosen over Ctrl+U because Ctrl+Backspace sends
# the same ^U byte (\x15) in most terminals, intercepting "delete to BOL".
unbind-key -T root C-u
bind-key -T root C-l run-shell -b "tmux capture-pane -p -J -S -500 | grep -oE 'https?://[^[:space:]\"}>)]+' | awk '!seen[\$0]++' | fzf-tmux -p 80%,40% --reverse --no-sort --prompt='Open URL: ' | xargs open"

# ── Shortcuts (root table — no prefix needed) ───────────────────────
#   Ctrl+Space   Toggle: switch to last active session (Alt+Tab for sessions)
#   Ctrl+l       URL picker (fzf popup, opens in browser)
#   Ctrl+t       Floating scratchpad terminal (press Ctrl+d or exit to dismiss)
#   Ctrl+e       File browser (fzf + bat preview, opens selection in $EDITOR)
#   Ctrl+f       → Ctrl+e alias (Termius on iPhone cannot send Ctrl+E)
#   Ctrl+g       Floating git log (q to dismiss)
#   Ctrl+n       New named session (prompts for name in status bar; attach if already exists)
#   Ctrl+r       Rename current session (pre-filled with current name)
#   Ctrl+s       Session switcher (fzf popup, jump between sessions)
#   Ctrl+w       Workspace connect (SSH into workspace, creates tmux session if needed)
#   Ctrl+k       Kill sessions (fzf popup, multi-select with Tab)
#   Ctrl+q       → Ctrl+k alias (Termius on iPhone cannot send Ctrl+K)
bind-key -T root C-Space switch-client -l
bind-key -T root C-t display-popup -E -w 80% -h 60%
bind-key -T root C-e display-popup -E -w 85% -h 85% -d '#{pane_current_path}' "\${HOME}/.dotfiles/shell/bin/fb"
# Termius alias: Ctrl+F → Ctrl+E (file browser) — Termius cannot bind Ctrl+E
bind-key -T root C-f display-popup -E -w 85% -h 85% -d '#{pane_current_path}' "\${HOME}/.dotfiles/shell/bin/fb"
bind-key -T root C-g display-popup -E -w 80% -h 80% -d '#{pane_current_path}' 'git log --oneline --graph --decorate --color=always -50 | fzf --ansi --reverse --no-sort --preview="git show --color=always {2}" --preview-window=right:50% --prompt="Commit: "'
bind-key -T root C-n command-prompt -p "New session:" "new-session -A -s '%%'"
bind-key -T root C-r command-prompt -I "#S" -p "Rename session:" "rename-session '%%'"
bind-key -T root C-s display-popup -E -w 80% -h 60% "tmux-ls | fzf --ansi --reverse --no-sort --prompt='Session: ' --preview='tmux capture-pane -ep -t {-1}' --preview-window=right:60% | awk '{print \$NF}' | xargs tmux switch-client -t"
bind-key -T root C-w if-shell 'tmux has-session -t ws-luphaz 2>/dev/null' \
  'switch-client -t ws-luphaz' \
  'new-session -d -s ws-luphaz "ssh workspace-luphaz" ; switch-client -t ws-luphaz'
bind-key -T root C-k display-popup -E -w 80% -h 60% "\${HOME}/.dotfiles/shell/bin/tmux-kill"
# Termius alias: Ctrl+Q → Ctrl+K (kill session) — Termius cannot bind Ctrl+K
bind-key -T root C-q display-popup -E -w 80% -h 60% "\${HOME}/.dotfiles/shell/bin/tmux-kill"

# ── Shortcuts (prefix table — Ctrl+b then key) ──────────────────────
#   Ctrl+b, Escape  Force-close a hung or unresponsive popup
#   Ctrl+b, k    Clear screen + scrollback (CMD+K equivalent for tmux)
#   Ctrl+b, r    Refresh dotfiles (git pull + reload tmux)
#   Ctrl+b, S    Toggle synchronized panes (type in all panes at once)
#   Ctrl+b, _    Toggle silence monitor (notifies after 10s of quiet)
bind-key Escape display-popup -C
bind-key k clear-history \; send-keys C-l
bind-key -n M-k clear-history \; send-keys C-l
bind-key r display-popup -E -w 60% -h 40% '\
  echo "pulling dotfiles..." && \
  (cd ~/.dotfiles && git pull --ff-only) && \
  tmux source-file ~/.tmux.conf && \
  echo "" && echo "all green"'
bind-key S set-option synchronize-panes
bind-key _ set-option -p monitor-silence 10

# ── Silence Monitor ─────────────────────────────────────────────────
# Visual notification when a monitored pane goes quiet (long task done).
set -g visual-silence on

# ── Window & Pane Numbering ──────────────────────────────────────────
# Start at 1 (matches keyboard number row) and close gaps on removal.
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
