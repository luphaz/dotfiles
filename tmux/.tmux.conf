# ── Passthrough & Environment ────────────────────────────────────────
# Allow passthrough sequences so Claude Code notifications and progress
# bar reach the outer terminal (cmux) when running inside tmux or over SSH.
# (tmux 3.3+ only — silently ignored on older versions)
if-shell 'tmux -V | awk "{if (\$2+0 >= 3.3) exit 0; else exit 1}"' \
  'set -g allow-passthrough on'

# Propagate SSH/display env vars into new panes and windows so agent
# forwarding and X11/Wayland display survive session reattach.
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION DISPLAY"

# ── Prefix ───────────────────────────────────────────────────────────
# Ctrl+b (default). Double Ctrl+b to forward prefix to nested tmux.
set -g prefix C-b

# ── Scrolling & Mouse ───────────────────────────────────────────────
# Enable mouse/trackpad/touch input: scroll with swipe on Mac trackpad,
# swipe in Termius on iPhone, click to select panes, drag to resize.
set -g mouse on

# ── Terminal & Rendering ─────────────────────────────────────────────
# Modern terminfo with italic, strikethrough, and truecolor support.
set -g default-terminal "tmux-256color"

# Zero delay after Escape -- eliminates input lag. Safe because we use
# Ctrl+b as prefix (not raw Escape-prefixed sequences).
set -sg escape-time 0

# Let applications detect pane focus changes (e.g. vim autocommands).
set -g focus-events on

# Forward extended key sequences (Shift+Enter, Ctrl+Enter, etc.) to
# applications unconditionally. Without this, tmux swallows modifier
# info and Claude Code can't distinguish Shift+Enter from Enter.
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# Enable OSC 8 hyperlink passthrough so the outer terminal can render
# clickable URLs. Use Cmd+Click on Mac (bypasses tmux mouse capture).
set -as terminal-features 'xterm*:hyperlinks'

# ── Scrollback ───────────────────────────────────────────────────────
# 50k lines per pane. Claude Code output is verbose; the default 2000
# is far too small for scrolling back through tool calls and diffs.
set -g history-limit 50000

# ── Clipboard ────────────────────────────────────────────────────────
# OSC 52: let tmux set the system clipboard through the outer terminal.
# Works across Ghostty/cmux locally and Termius over SSH.
set -g set-clipboard on

# Also pipe to pbcopy for local macOS sessions (tmux 3.2+ feature).
set -g copy-command "pbcopy"

# ── Status Bar ────────────────────────────────────────────────────────
# Left: session name (repo). Right: live git branch + time.
# Branch is dynamic (re-evaluated every 5s) so it tracks Claude's
# branch switches (main → feature branch workflow).
set -g status-style 'fg=white,bg=default'
set -g status-left '#[fg=green,bold] #S #[default]'
set -g status-left-length 30
set -g status-right '#[fg=yellow]#(git -C "#{pane_current_path}" --no-optional-locks symbolic-ref --short HEAD 2>/dev/null)#[default] #[fg=white]%H:%M#[default] '
set -g status-right-length 60
set -g status-interval 5
set -g window-status-current-style 'fg=cyan,bold'

# ── Shortcuts ────────────────────────────────────────────────────────
# Two access modes for every binding:
#   Fast (local):   Ctrl+<key>     — root table, intercepted by local tmux
#   Nested (remote): Ctrl+b <key>  — prefix table, Ctrl+b Ctrl+b <key> for inner tmux
#
# Fast local only (no nested equivalent):
#   Ctrl+l       URL picker (opens in local browser)
#   M-k          Clear screen + scrollback (CMD+K via Ghostty)
#
# Both fast + nested:
#   Ctrl+Space / Space   Toggle last session
#   Ctrl+t / t           Scratchpad shell in Claude's worktree (40% bottom split; fzf if pane has ≥2 Claudes)
#   Ctrl+e / e           File browser (fzf + bat preview)
#   Ctrl+f / f           File browser alias (Termius)
#   Ctrl+g / g           Git log popup
#   Ctrl+n / n           New named session
#   Ctrl+x / x           Rename current session (moved off Ctrl+R so atuin owns reverse history search)
#   Ctrl+s / s           Session switcher (fzf popup) — typed name with no match creates a new session
#   Ctrl+o / o           Open Claude's branch on GitHub (fzf if pane has ≥2 Claudes; fallback to pane cwd)
#   Ctrl+p / p           Open PR for Claude's branch in browser (fzf if ≥2; fallback to pane cwd)
#   Ctrl+k / k           Kill sessions (fzf popup, multi-select)
#   Ctrl+q / q           Kill sessions alias (Termius)
#
# Prefix only (no fast shortcut — Ctrl+U conflicts with Ctrl+Backspace \x15):
#   u            Update dotfiles (pull + reload tmux)
#   w            Workspace main (ws-luphaz)
#   c            Workspace colibri (ws-luphaz-colibri)
#   S            Toggle synchronized panes
#   _            Toggle silence monitor
#   Escape       Force-close popup

# ── Root table (fast local shortcuts) ────────────────────────────────
unbind-key -T root C-w
bind-key -T root C-Space switch-client -l
bind-key -T root C-t run-shell -b 'tmux split-window -v -l 40% "$HOME/.dotfiles/shell/bin/claude-cwd-run shell #{pane_id}"'
bind-key -T root C-e display-popup -E -w 85% -h 85% -d '#{pane_current_path}' "\${HOME}/.dotfiles/shell/bin/fb"
bind-key -T root C-f display-popup -E -w 85% -h 85% -d '#{pane_current_path}' "\${HOME}/.dotfiles/shell/bin/fb"
bind-key -T root C-g display-popup -E -w 80% -h 80% -d '#{pane_current_path}' 'git log --oneline --graph --decorate --color=always -50 | fzf --ansi --reverse --no-sort --preview="git show --color=always {2}" --preview-window=right:50% --prompt="Commit: "'
bind-key -T root C-n command-prompt -p "New session:" "new-session -A -s '%%'"
bind-key -T root C-x command-prompt -I "#S" -p "Rename session:" "rename-session '%%'"
bind-key -T root C-s display-popup -E -w 80% -h 60% "\${HOME}/.dotfiles/shell/bin/tmux-switch"
bind-key -T root C-k display-popup -E -w 80% -h 60% "\${HOME}/.dotfiles/shell/bin/tmux-kill"
bind-key -T root C-q display-popup -E -w 80% -h 60% "\${HOME}/.dotfiles/shell/bin/tmux-kill"
unbind-key -T root C-u
bind-key -T root C-o if-shell '[ "$($HOME/.dotfiles/shell/bin/claude-pane-cwd --count #{pane_id})" -gt 1 ]' \
  'display-popup -E -w 80% -h 40% "$HOME/.dotfiles/shell/bin/claude-cwd-run open-branch #{pane_id}"' \
  'run-shell -b "$HOME/.dotfiles/shell/bin/claude-cwd-run open-branch #{pane_id}"'
bind-key -T root C-p if-shell '[ "$($HOME/.dotfiles/shell/bin/claude-pane-cwd --count #{pane_id})" -gt 1 ]' \
  'display-popup -E -w 80% -h 40% "$HOME/.dotfiles/shell/bin/claude-cwd-run open-pr #{pane_id}"' \
  'run-shell -b "$HOME/.dotfiles/shell/bin/claude-cwd-run open-pr #{pane_id}"'
bind-key -T root C-l run-shell -b "command -v fzf-tmux >/dev/null && tmux capture-pane -p -J -S -500 | grep -oE 'https?://[^[:space:]\"}>)]+' | awk '{lines[NR]=\$0} END{for(i=NR;i>=1;i--) if(!seen[lines[i]]++) print lines[i]}' | fzf-tmux -p 80%,40% --reverse --no-sort --multi --bind 'ctrl-a:toggle-all' --prompt='Open URL(s): ' --header='Tab: select · Ctrl-A: toggle all · Enter: open' | xargs open || true"
bind-key -n M-k clear-history \; send-keys clear Enter

# ── Prefix table (nested support — Ctrl+b Ctrl+b <key> for remote) ──
bind-key Space switch-client -l
bind-key t run-shell -b 'tmux split-window -v -l 40% "$HOME/.dotfiles/shell/bin/claude-cwd-run shell #{pane_id}"'
bind-key e display-popup -E -w 85% -h 85% -d '#{pane_current_path}' "\${HOME}/.dotfiles/shell/bin/fb"
bind-key f display-popup -E -w 85% -h 85% -d '#{pane_current_path}' "\${HOME}/.dotfiles/shell/bin/fb"
bind-key g display-popup -E -w 80% -h 80% -d '#{pane_current_path}' 'git log --oneline --graph --decorate --color=always -50 | fzf --ansi --reverse --no-sort --preview="git show --color=always {2}" --preview-window=right:50% --prompt="Commit: "'
bind-key n command-prompt -p "New session:" "new-session -A -s '%%'"
bind-key x command-prompt -I "#S" -p "Rename session:" "rename-session '%%'"
bind-key s display-popup -E -w 80% -h 60% "\${HOME}/.dotfiles/shell/bin/tmux-switch"
bind-key o if-shell '[ "$($HOME/.dotfiles/shell/bin/claude-pane-cwd --count #{pane_id})" -gt 1 ]' \
  'display-popup -E -w 80% -h 40% "$HOME/.dotfiles/shell/bin/claude-cwd-run open-branch #{pane_id}"' \
  'run-shell -b "$HOME/.dotfiles/shell/bin/claude-cwd-run open-branch #{pane_id}"'
bind-key p if-shell '[ "$($HOME/.dotfiles/shell/bin/claude-pane-cwd --count #{pane_id})" -gt 1 ]' \
  'display-popup -E -w 80% -h 40% "$HOME/.dotfiles/shell/bin/claude-cwd-run open-pr #{pane_id}"' \
  'run-shell -b "$HOME/.dotfiles/shell/bin/claude-cwd-run open-pr #{pane_id}"'
bind-key k display-popup -E -w 80% -h 60% "\${HOME}/.dotfiles/shell/bin/tmux-kill"
bind-key q display-popup -E -w 80% -h 60% "\${HOME}/.dotfiles/shell/bin/tmux-kill"
bind-key w if-shell 'tmux has-session -t ws-luphaz 2>/dev/null' \
  'switch-client -t ws-luphaz' \
  'new-session -d -s ws-luphaz "ssh workspace-luphaz" ; switch-client -t ws-luphaz'
bind-key c if-shell 'tmux has-session -t ws-luphaz-colibri 2>/dev/null' \
  'switch-client -t ws-luphaz-colibri' \
  'new-session -d -s ws-luphaz-colibri "ssh workspace-luphaz -t tmux new-session -A -s colibri" ; switch-client -t ws-luphaz-colibri'
bind-key u if-shell '[ -n "$(ls -1 $HOME/git/dotfiles/.claude/worktrees 2>/dev/null)" ]' \
  'display-popup -E -w 60% -h 40% "$HOME/.dotfiles/shell/bin/dotfiles-switch"' \
  'run-shell -b "$HOME/.dotfiles/shell/bin/dotfiles-switch main"'
# C-b U: force ~/.dotfiles → main (no fzf, no worktree check). Same end-state as
# C-b u when no worktrees exist; U is for when worktrees do exist but you want
# to skip the picker and just snap back to main.
bind-key U run-shell -b "$HOME/.dotfiles/shell/bin/dotfiles-switch main"
bind-key S set-option synchronize-panes
bind-key _ set-option -p monitor-silence 10
bind-key Escape display-popup -C

# ── Silence Monitor ─────────────────────────────────────────────────
# Visual notification when a monitored pane goes quiet (long task done).
set -g visual-silence on

# ── Session Destroy Behavior ─────────────────────────────────────────
# When a session is destroyed (exit/kill), switch to previous session
# instead of detaching (which would close the terminal).
set -g detach-on-destroy off

# ── Window & Pane Numbering ──────────────────────────────────────────
# Start at 1 (matches keyboard number row) and close gaps on removal.
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ── Local override hook ──────────────────────────────────────────────
# Optional file for machine-specific or layered tmux config (e.g. an
# overlay repo that wants to override bindings without forking this
# file). The -q flag silences the missing-file warning when it doesn't
# exist, so the public default behaviour is unchanged on bare machines.
source-file -q ~/.tmux.private.conf
